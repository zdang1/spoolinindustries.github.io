<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[SECTION NAME] - Admin Panel | Spoolin Industries</title>
    <link rel="stylesheet" href="admin/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="admin-sidebar-logo">
                <img src="assets/images/e564d451be837b57-1192x710.png-108x64.png" alt="Spoolin Industries">
            </div>
            <nav>
                <ul class="admin-nav">
                    <!-- 
                        INSTRUCTIONS: Update navigation links
                        1. Set the active link to the current page
                        2. Update href attributes to match your page filename
                        3. Update icon classes (Font Awesome) as needed
                    -->
                    <li class="admin-nav-item">
                        <a href="admin-products.html" class="admin-nav-link">
                            <i class="fas fa-box"></i>
                            Products
                        </a>
                    </li>
                    <li class="admin-nav-item">
                        <a href="admin-orders.html" class="admin-nav-link">
                            <i class="fas fa-shopping-cart"></i>
                            Orders
                        </a>
                    </li>
                    <li class="admin-nav-item">
                        <a href="admin-services.html" class="admin-nav-link">
                            <i class="fas fa-tools"></i>
                            Services
                        </a>
                    </li>
                    <li class="admin-nav-item">
                        <a href="admin-users.html" class="admin-nav-link">
                            <i class="fas fa-users"></i>
                            Users
                        </a>
                    </li>
                    <!-- Add your new nav item here -->
                    <li class="admin-nav-item">
                        <a href="admin-[your-section].html" class="admin-nav-link active">
                            <i class="fas fa-icon-name"></i>
                            [Section Name]
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <div>
                    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>[Section Name]</h1>
                </div>
                <div class="admin-header-actions">
                    <button class="btn btn-secondary btn-sm" onclick="signOut()">
                        <i class="fas fa-sign-out-alt"></i> Sign Out
                    </button>
                </div>
            </header>

            <div class="admin-content">
                <!-- Page Header -->
                <div class="page-header">
                    <div>
                        <h2>[Section Title]</h2>
                        <p style="color: var(--admin-text-muted); margin-top: 5px;">
                            [Section description]
                        </p>
                    </div>
                    <!-- Add action buttons here if needed -->
                    <button class="btn btn-primary" onclick="addItem()">
                        <i class="fas fa-plus"></i> Add [Item]
                    </button>
                </div>

                <!-- 
                    CONTENT AREA
                    Replace this section with your specific content:
                    - Tables for listing items
                    - Forms for adding/editing
                    - Modals for forms
                    - Any other UI components
                -->
                <div class="admin-table-container">
                    <!-- Example table structure -->
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Column 1</th>
                                <th>Column 2</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="items-tbody">
                            <!-- Table rows will be populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- 
        MODAL TEMPLATE (if needed)
        Copy this modal structure for add/edit forms
    -->
    <div class="modal-overlay" id="item-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Add [Item]</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="item-form">
                <div class="modal-body">
                    <!-- Form fields go here -->
                    <div class="form-group">
                        <label for="field-name" class="form-label">Field Label *</label>
                        <input 
                            type="text" 
                            id="field-name" 
                            class="form-control" 
                            placeholder="Enter value"
                            required
                        >
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Save [Item]
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div class="spinner-overlay" id="loading-spinner">
        <div class="loading"></div>
    </div>

    <!-- Firebase SDK - Compat version for easier usage -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <!-- Firebase Config -->
    <script src="admin/js/firebase-config.js"></script>
    
    <!-- 
        YOUR SECTION-SPECIFIC JAVASCRIPT
        Create a new file: admin/js/[your-section].js
        Include it here: <script src="admin/js/[your-section].js"></script>
        
        Example structure for your JS file:
        
        document.addEventListener('DOMContentLoaded', async () => {
            // Check authentication
            await window.firebaseHelpers.requireAuth();
            
            // Initialize your section
            await initSection();
        });
        
        async function initSection() {
            // Set up Firestore collection reference
            const collection = window.firebaseDb.collection('your-collection-name');
            
            // Load existing items
            await loadItems();
            
            // Set up form handlers
            setupFormHandlers();
        }
        
        async function loadItems() {
            // Fetch from Firestore and render
        }
        
        function setupFormHandlers() {
            // Handle form submission
        }
        
        // CRUD functions: addItem(), editItem(), deleteItem(), saveItem()
    -->
    
    <!-- Common Scripts -->
    <script>
        // Check authentication
        document.addEventListener('DOMContentLoaded', async () => {
            await window.firebaseHelpers.requireAuth();
            
            // Initialize your section here
            // await initYourSection();
        });

        // Mobile menu toggle
        function toggleMobileMenu() {
            const sidebar = document.getElementById('admin-sidebar');
            sidebar.classList.toggle('mobile-open');
        }

        // Sign out function
        async function signOut() {
            if (confirm('Are you sure you want to sign out?')) {
                try {
                    await window.firebaseHelpers.signOut();
                    window.location.href = 'admin-login.html';
                } catch (error) {
                    console.error('Sign out error:', error);
                    alert('Error signing out. Please try again.');
                }
            }
        }

        // Modal functions (if using modals)
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeModal() {
            const modals = document.querySelectorAll('.modal-overlay');
            modals.forEach(modal => {
                modal.classList.remove('active');
            });
            document.body.style.overflow = '';
            
            // Reset form if needed
            const form = document.getElementById('item-form');
            if (form) {
                form.reset();
            }
        }

        // Utility functions
        function showAlert(message, type = 'info') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            const content = document.querySelector('.admin-content');
            if (content) {
                content.insertBefore(alertDiv, content.firstChild);
                setTimeout(() => alertDiv.remove(), 5000);
            }
        }

        function showLoading(show) {
            const spinner = document.getElementById('loading-spinner');
            if (spinner) {
                spinner.classList.toggle('active', show);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
